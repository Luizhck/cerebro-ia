<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧠 LRMODS - IA</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1e1e30;
            --green: #00ff88;
            --blue: #4488ff;
            --red: #ff4455;
            --yellow: #ffaa00;
            --text: #e0e0e0;
            --text2: #8888aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            padding: 0;
            margin: 0;
        }

        .container {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER COMPACTO */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .header .logo { font-size: 1.5em; }
        .header h1 { 
            font-size: 1em; 
            background: linear-gradient(135deg, var(--green), #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .stats {
            margin-left: auto;
            display: flex;
            gap: 8px;
            font-size: 0.7em;
        }
        .stats span { 
            padding: 3px 8px;
            background: var(--border);
            border-radius: 12px;
            white-space: nowrap;
        }

        /* CHAT OCUPA TUDO */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .message {
            max-width: 88%;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; }
        .message.ia { align-self: flex-start; }

        .message .bubble {
            padding: 12px 14px;
            border-radius: 14px;
            line-height: 1.5;
            font-size: 0.9em;
            position: relative;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user .bubble {
            background: var(--blue);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.ia .bubble {
            background: var(--card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255,255,255,0.08);
            border: none;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7em;
            opacity: 0;
            transition: 0.2s;
        }
        .message.ia .bubble:hover .copy-btn { opacity: 1; }
        .copy-btn:active { background: var(--green); color: #000; }

        .message .sender {
            font-size: 0.65em;
            color: var(--text2);
            margin-bottom: 3px;
            padding: 0 2px;
        }

        /* INPUT FIXO EMBAIXO */
        .input-area {
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            background: var(--card);
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            color: #fff;
            font-size: 0.9em;
            outline: none;
        }
        .input-area input:focus { border-color: var(--blue); }
        .input-area button {
            background: var(--blue);
            border: none;
            color: #fff;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
        }
        .input-area button:active { background: #5599ff; }

        /* BOTÕES RÁPIDOS */
        .quick-buttons {
            display: flex;
            gap: 4px;
            padding: 6px 12px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .quick-buttons::-webkit-scrollbar { height: 0; }
        .quick-btn {
            background: var(--border);
            border: none;
            color: var(--text2);
            padding: 5px 12px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.7em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .quick-btn:active { background: var(--blue); color: #fff; }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--green);
            color: #000;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8em;
            z-index: 99;
            animation: toast 2.5s ease forwards;
        }
        @keyframes toast {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; }
        }

        @media (min-width: 768px) {
            .message { max-width: 65%; }
            .chat-messages { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">🧠</div>
            <h1>LRMODS IA</h1>
            <div class="stats">
                <span>🟢 <b id="online">0</b></span>
                <span>🔍 <b id="scans">0</b></span>
            </div>
        </div>

        <!-- CHAT -->
        <div class="chat-container">
            <div class="chat-messages" id="chatBox">
                <div class="message ia">
                    <div class="sender">🧠 Professora IA</div>
                    <div class="bubble">
                        👋 Olá! Sou sua assistente de segurança.<br>
                        Pergunte sobre anti-cheats, FOV, evasão...
                        <button class="copy-btn" onclick="copiarTexto(this)">📋</button>
                    </div>
                </div>
            </div>

            <div class="quick-buttons">
                <button class="quick-btn" onclick="enviar('Como anti-cheats detectam Aimbot?')">🎯 Aimbot</button>
                <button class="quick-btn" onclick="enviar('FOV seguro?')">📐 FOV</button>
                <button class="quick-btn" onclick="enviar('Padrões que ativam alertas?')">⚠️ Alertas</button>
                <button class="quick-btn" onclick="enviar('Como evitar detecção?')">🛡️ Evasão</button>
                <button class="quick-btn" onclick="enviar('Métodos de detecção?')">🔍 Métodos</button>
            </div>

            <div class="input-area">
                <input type="text" id="chatInput" placeholder="Digite..." onkeypress="if(event.key==='Enter') enviar()">
                <button onclick="enviar()">📤</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://cerebro-ia-mh3k.onrender.com';

        function copiarTexto(botao) {
            const texto = botao.parentElement.innerText.replace('📋', '').trim();
            navigator.clipboard.writeText(texto).then(() => {
                botao.textContent = '✅';
                mostrarToast('Copiado!');
                setTimeout(() => botao.textContent = '📋', 1500);
            });
        }

        function mostrarToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        async function enviar(msg) {
            const input = document.getElementById('chatInput');
            const pergunta = msg || input.value.trim();
            if (!pergunta) return;
            if (!msg) input.value = '';

            adicionarMsg(pergunta, 'user');
            const loadId = adicionarMsg('⏳ Pensando...', 'ia', true);

            try {
                const r = await fetch(API + '/api/ia/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ pergunta })
                });
                const d = await r.json();
                removerMsg(loadId);
                
                let resp = (d.resposta || 'Sem resposta')
                    .replace(/\\n/g, '\n')
                    .replace(/\*\*/g, '');
                adicionarMsg(resp, 'ia');
            } catch (e) {
                removerMsg(loadId);
                adicionarMsg('❌ Erro: ' + e.message, 'ia');
            }
        }

        function adicionarMsg(texto, tipo, temp = false) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            const id = 'm-' + Date.now();
            div.id = id;
            div.className = 'message ' + tipo;
            div.innerHTML = `
                <div class="sender">${tipo === 'user' ? '👤 Você' : '🧠 IA'}</div>
                <div class="bubble">
                    ${texto}
                    ${tipo === 'ia' && !temp ? '<button class="copy-btn" onclick="copiarTexto(this)">📋</button>' : ''}
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return id;
        }

        function removerMsg(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        async function att() {
            try {
                const r = await fetch(API + '/api/dados');
                const d = await r.json();
                document.getElementById('online').textContent = d.estatisticas?.usersOnline || 0;
                document.getElementById('scans').textContent = d.antiCheat?.totalScans || 0;
            } catch (e) {}
        }
        setInterval(att, 5000);
        att();
    </script>
</body>
</html>
